<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arne Tonning</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #ffffff;
      --text: #0b1a33;
      --text-secondary: #3a4d6e;
      --accent: #0f2b5b;
      --border: #c0cde0;
      --hover-bg: #e8eef6;
      --photo-bg: #d0dae8;
      --toggle-bg: #e8eef6;
    }

    [data-theme="dark"] {
      --bg: #0b1a33;
      --text: #e8eef6;
      --text-secondary: #a0b4d0;
      --accent: #4a7cc9;
      --border: #1e3a5f;
      --hover-bg: #142d52;
      --photo-bg: #1e3a5f;
      --toggle-bg: #142d52;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: var(--text);
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      transition: background 0.3s, color 0.3s;
    }

    .card {
      max-width: 480px;
      width: 100%;
      text-align: center;
    }

    .toggle {
      position: fixed;
      top: 1.25rem;
      right: 1.25rem;
      background: var(--toggle-bg);
      border: 1px solid var(--border);
      border-radius: 50%;
      width: 42px;
      height: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.3s, border-color 0.3s;
    }

    .toggle:hover {
      background: var(--hover-bg);
    }

    .toggle svg {
      width: 20px;
      height: 20px;
      color: var(--text);
    }

    .icon-moon,
    [data-theme="dark"] .icon-sun {
      display: block;
    }

    .icon-sun,
    [data-theme="dark"] .icon-moon {
      display: none;
    }

    [data-theme="dark"] .icon-sun {
      display: block;
    }

    .photo {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      background: var(--photo-bg);
      margin: 0 auto 1.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      transition: background 0.3s;
    }

    .photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 600;
      margin-bottom: 0.75rem;
    }

    .bio {
      font-size: 1rem;
      line-height: 1.6;
      color: var(--text-secondary);
      margin-bottom: 2rem;
      transition: color 0.3s;
    }

    .links {
      display: flex;
      gap: 1.25rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .links a {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.6rem 1.25rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      text-decoration: none;
      color: var(--text);
      font-size: 0.9rem;
      transition: background 0.2s, border-color 0.2s, color 0.3s;
    }

    .links a:hover {
      background: var(--hover-bg);
      border-color: var(--accent);
    }

    .links svg {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }

    @media (max-width: 480px) {
      h1 {
        font-size: 1.5rem;
      }

      .photo {
        width: 120px;
        height: 120px;
      }

      .links {
        flex-direction: column;
        align-items: center;
      }

      .links a {
        width: 100%;
        max-width: 200px;
        justify-content: center;
      }
    }
  </style>
</head>
<body>
  <button class="toggle" aria-label="Toggle dark mode" onclick="toggleTheme()">
    <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1111.21 3a7 7 0 009.79 9.79z"/></svg>
    <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
  </button>

  <main class="card">
    <div class="photo">
      <img src="1679925997749.jpeg" alt="Arne Tonning">
    </div>

    <h1>Arne Tonning</h1>

    <p class="bio">
      Welcome! I'm Arne. This is my test page.
    </p>

    <div class="links">
      <a href="https://www.linkedin.com/in/arnetonning" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
        LinkedIn
      </a>
    </div>
  </main>

  <script>
    function toggleTheme() {
      const html = document.documentElement;
      const current = html.getAttribute('data-theme');
      const next = current === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', next === 'dark' ? 'dark' : '');
      if (next === 'light') html.removeAttribute('data-theme');
      localStorage.setItem('theme', next);
    }

    (function () {
      const saved = localStorage.getItem('theme');
      if (saved === 'dark' || (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    })();
  </script>
</body>
</html>
